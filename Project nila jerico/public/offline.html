<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scentify Offline</title>
  <style>
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:#f5f5ff;color:#1f2937;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px;}
    .offline-card{max-width:420px;background:#ffffff;border-radius:24px;box-shadow:0 24px 80px rgba(79,70,229,.12);padding:36px;}
    h1{margin:0 0 16px;font-size:clamp(2rem,4vw,2.75rem);}
    p{margin:0 0 24px;color:#4b5563;line-height:1.7;}
    a{display:inline-flex;padding:14px 22px;border-radius:999px;background:#4f46e5;color:#ffffff;text-decoration:none;font-weight:600;box-shadow:0 12px 30px rgba(79,70,229,.18);}
  </style>
</head>
<body>
  <div class="offline-card">
    <h1>You're offline</h1>
    <p>Some resources are unavailable, but your cached perfume catalog is still ready to explore.</p>
    <a href="/">Return to Scentify</a>
  </div>
</body>
</html>
